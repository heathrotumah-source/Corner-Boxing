<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corner — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{ --bg:#15171A; --card:#1E2127; --line:#2A2D32; --blue:#D4FF3F; --text:#FAFAF7; --grey:#8A8D91; --red:#e5484d; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .wrap{width:100%;max-width:360px;}
  h1{font-size:20px;font-weight:800;margin-bottom:4px;}
  p.sub{font-size:13px;color:var(--grey);margin-bottom:20px;line-height:1.5;}
  label{display:block;font-size:11.5px;color:var(--grey);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
  input{width:100%;background:#0f1113;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:12px;font-family:inherit;font-size:16px;margin-bottom:14px;}
  input:focus{outline:none;border-color:var(--blue);}
  .pw-wrap{position:relative;margin-bottom:14px;}
  .pw-wrap input{padding-right:44px;margin-bottom:0;}
  .pw-toggle{position:absolute;right:4px;top:0;bottom:0;width:auto;background:none;border:none;color:var(--grey);font-size:16px;cursor:pointer;padding:8px;display:flex;align-items:center;}
  .pw-toggle:hover{background:none;color:var(--blue);}
  button{width:100%;background:var(--blue);color:#15171A;border:none;border-radius:8px;padding:14px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;}
  button:disabled{opacity:.5;pointer-events:none;}
  .msg{border-radius:10px;padding:10px 12px;font-size:12.5px;margin-bottom:14px;display:none;}
  .msg.show{display:block;}
  .msg.error{background:rgba(229,72,77,.12);border:1px solid rgba(229,72,77,.4);color:var(--red);}
  .msg.ok{background:rgba(212,255,63,.12);border:1px solid rgba(212,255,63,.4);color:var(--blue);}
  a{color:var(--blue);}
</style>
</head>
<body>
<div class="wrap">
  <h1>Set a new password</h1>
  <p class="sub" id="sub-text">Enter a new password for your Corner account.</p>
  <div id="msg" class="msg"></div>
  <form id="reset-form">
    <label for="pw1">New password</label>
    <div class="pw-wrap">
      <input type="password" id="pw1" autocomplete="new-password" placeholder="At least 8 characters">
      <button type="button" class="pw-toggle" onclick="togglePasswordVisibility('pw1', this)" aria-label="Show password"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <label for="pw2">Confirm password</label>
    <div class="pw-wrap">
      <input type="password" id="pw2" autocomplete="new-password" placeholder="Repeat password">
      <button type="button" class="pw-toggle" onclick="togglePasswordVisibility('pw2', this)" aria-label="Show password"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <button type="submit" id="submit-btn">Update Password</button>
  </form>
</div>
<script>
/* Same config as corner.html -- keep both in sync if the Supabase project changes. */
const SUPABASE_URL = 'https://neucsynxpjsqhsyzgrcf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ldWNzeW54cGpzcWhzeXpncmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTkyNjEsImV4cCI6MjA5OTE5NTI2MX0.qsm1NHe7EUbY7n7tMu68_sUqAY-56cUH63NRU2QipVI';
const sb = (SUPABASE_URL.startsWith('YOUR_') || !window.supabase) ? null : window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const EYE_ICON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYE_OFF_ICON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.6 21.6 0 0 1 5.06-6.06M9.9 4.24A10.4 10.4 0 0 1 12 4c7 0 11 8 11 8a21.6 21.6 0 0 1-3.22 4.47M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
function togglePasswordVisibility(inputId, btn){
  const input = document.getElementById(inputId);
  const showing = input.type === 'text';
  input.type = showing ? 'password' : 'text';
  btn.innerHTML = showing ? EYE_ICON : EYE_OFF_ICON;
  btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
}

const msgEl = document.getElementById('msg');
function showMsg(text, kind){
  msgEl.textContent = text;
  msgEl.className = 'msg show ' + kind;
}

if(!sb){
  showMsg('This page is not connected to a backend yet.', 'error');
  document.getElementById('submit-btn').disabled = true;
} else {
  // Clicking the emailed reset link lands here with a recovery token in the
  // URL hash; supabase-js parses it automatically and fires this event once
  // a temporary "recovery" session is established.
  sb.auth.onAuthStateChange((event)=>{
    if(event === 'PASSWORD_RECOVERY'){
      document.getElementById('sub-text').textContent = 'Recovery link confirmed -- choose a new password below.';
    }
  });
}

document.getElementById('reset-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  if(!sb) return;
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if(pw1.length < 8){ showMsg('Password must be at least 8 characters.', 'error'); return; }
  if(pw1 !== pw2){ showMsg('Passwords do not match.', 'error'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  const { error } = await sb.auth.updateUser({ password: pw1 });
  if(error){
    showMsg(error.message || 'Could not update your password -- the link may have expired. Request a new one from the app.', 'error');
    btn.disabled = false;
    return;
  }
  showMsg('Password updated. You can close this tab and log in from the app with your new password.', 'ok');
  document.getElementById('reset-form').style.display = 'none';
});
</script>
</body>
</html>
